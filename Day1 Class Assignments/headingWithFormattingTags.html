<!doctype html>
<html>
  <head>
    <title>Headings</title>
  </head>
  <body>
    <h1><mark>Structure of a Webpage</mark></h1>

    <p>
      HTML is the standard markup language used to create the structure and
      content of web pages. A <u>well-formed HTML document</u>
    </p>

    <div>
      <marquee direction="left">DOCTYPE</marquee>
    </div>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>

    <div>
      <marquee direction="left">SCROLLING</marquee>
    </div>

    <ul>
      <li type="square">Good Morning <i>All</i></li>
      <li type="circle">
        The <mark>Temperature</mark> is <b>35<sup>.</sup>C</b>
      </li>
    </ul>
  </body>
</html>
